<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="58%">
      <stop offset="0%" stop-color="#1a0535"/>
      <stop offset="100%" stop-color="#040012"/>
    </radialGradient>
    <linearGradient id="l-fill" x1="0%" y1="0%" x2="15%" y2="100%">
      <stop offset="0%"   stop-color="#e844ff"/>
      <stop offset="30%"  stop-color="#bb00ee"/>
      <stop offset="100%" stop-color="#6a0088"/>
    </linearGradient>
    <linearGradient id="l-shade" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.35"/>
    </linearGradient>
    <!-- Claw gradient: dark at base, bright teal at tip -->
    <linearGradient id="claw-fill" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%"   stop-color="#005c42"/>
      <stop offset="60%"  stop-color="#00a87c"/>
      <stop offset="100%" stop-color="#00e8b0"/>
    </linearGradient>
    <!-- Purple L glow -->
    <filter id="glow-l" x="-35%" y="-35%" width="170%" height="170%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="16" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Teal ring / claw glow -->
    <filter id="glow-t" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Tight edge accent glow -->
    <filter id="glow-e" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- ═══════════════════════════════════════════════
       RING SYSTEM — ARK-style detailed badge frame
       ═══════════════════════════════════════════════ -->

  <!-- Innermost dashed accent ring r=185 -->
  <circle cx="256" cy="256" r="185" fill="none" stroke="#00d4aa"
          stroke-width="1.5" stroke-dasharray="11 5.7" opacity="0.55"/>

  <!-- Radial tick marks between r=203..215 (24 ticks, wider at cardinals) -->
  <line x1="256.0" y1="58.0" x2="256.0" y2="41.0" stroke="#00d4aa" stroke-width="2.5" opacity="0.85"/>
  <line x1="308.5" y1="59.9" x2="311.6" y2="48.3" stroke="#00d4aa" stroke-width="1.5" opacity="0.85"/>
  <line x1="357.5" y1="80.2" x2="363.5" y2="69.8" stroke="#00d4aa" stroke-width="1.5" opacity="0.85"/>
  <line x1="399.5" y1="112.5" x2="408.0" y2="104.0" stroke="#00d4aa" stroke-width="1.5" opacity="0.85"/>
  <line x1="431.8" y1="154.5" x2="442.2" y2="148.5" stroke="#00d4aa" stroke-width="1.5" opacity="0.85"/>
  <line x1="452.1" y1="203.5" x2="463.7" y2="200.4" stroke="#00d4aa" stroke-width="1.5" opacity="0.85"/>
  <line x1="454.0" y1="256.0" x2="471.0" y2="256.0" stroke="#00d4aa" stroke-width="2.5" opacity="0.85"/>
  <line x1="452.1" y1="308.5" x2="463.7" y2="311.6" stroke="#00d4aa" stroke-width="1.5" opacity="0.85"/>
  <line x1="431.8" y1="357.5" x2="442.2" y2="363.5" stroke="#00d4aa" stroke-width="1.5" opacity="0.85"/>
  <line x1="399.5" y1="399.5" x2="408.0" y2="408.0" stroke="#00d4aa" stroke-width="1.5" opacity="0.85"/>
  <line x1="357.5" y1="431.8" x2="363.5" y2="442.2" stroke="#00d4aa" stroke-width="1.5" opacity="0.85"/>
  <line x1="308.5" y1="452.1" x2="311.6" y2="463.7" stroke="#00d4aa" stroke-width="1.5" opacity="0.85"/>
  <line x1="256.0" y1="454.0" x2="256.0" y2="471.0" stroke="#00d4aa" stroke-width="2.5" opacity="0.85"/>
  <line x1="203.5" y1="452.1" x2="200.4" y2="463.7" stroke="#00d4aa" stroke-width="1.5" opacity="0.85"/>
  <line x1="154.5" y1="431.8" x2="148.5" y2="442.2" stroke="#00d4aa" stroke-width="1.5" opacity="0.85"/>
  <line x1="112.5" y1="399.5" x2="104.0" y2="408.0" stroke="#00d4aa" stroke-width="1.5" opacity="0.85"/>
  <line x1="80.2"  y1="357.5" x2="69.8"  y2="363.5" stroke="#00d4aa" stroke-width="1.5" opacity="0.85"/>
  <line x1="59.9"  y1="308.5" x2="48.3"  y2="311.6" stroke="#00d4aa" stroke-width="1.5" opacity="0.85"/>
  <line x1="58.0"  y1="256.0" x2="41.0"  y2="256.0" stroke="#00d4aa" stroke-width="2.5" opacity="0.85"/>
  <line x1="59.9"  y1="203.5" x2="48.3"  y2="200.4" stroke="#00d4aa" stroke-width="1.5" opacity="0.85"/>
  <line x1="80.2"  y1="154.5" x2="69.8"  y2="148.5" stroke="#00d4aa" stroke-width="1.5" opacity="0.85"/>
  <line x1="112.5" y1="112.5" x2="104.0" y2="104.0" stroke="#00d4aa" stroke-width="1.5" opacity="0.85"/>
  <line x1="154.5" y1="80.2"  x2="148.5" y2="69.8"  stroke="#00d4aa" stroke-width="1.5" opacity="0.85"/>
  <line x1="203.5" y1="59.9"  x2="200.4" y2="48.3"  stroke="#00d4aa" stroke-width="1.5" opacity="0.85"/>

  <!-- 8 diamond markers at r=193 -->
  <polygon points="256.0,57.0 262.0,63.0 256.0,69.0 250.0,63.0"   fill="#00d4aa" opacity="0.9"/>
  <polygon points="392.5,113.5 398.5,119.5 392.5,125.5 386.5,119.5" fill="#00d4aa" opacity="0.9"/>
  <polygon points="449.0,250.0 455.0,256.0 449.0,262.0 443.0,256.0" fill="#00d4aa" opacity="0.9"/>
  <polygon points="392.5,386.5 398.5,392.5 392.5,398.5 386.5,392.5" fill="#00d4aa" opacity="0.9"/>
  <polygon points="256.0,443.0 262.0,449.0 256.0,455.0 250.0,449.0" fill="#00d4aa" opacity="0.9"/>
  <polygon points="119.5,386.5 125.5,392.5 119.5,398.5 113.5,392.5" fill="#00d4aa" opacity="0.9"/>
  <polygon points="63.0,250.0 69.0,256.0 63.0,262.0 57.0,256.0"   fill="#00d4aa" opacity="0.9"/>
  <polygon points="119.5,113.5 125.5,119.5 119.5,125.5 113.5,119.5" fill="#00d4aa" opacity="0.9"/>

  <!-- Inner detail ring r=219 -->
  <circle cx="256" cy="256" r="219" fill="none" stroke="#00d4aa" stroke-width="1.5" opacity="0.50"/>

  <!-- Primary ring r=228 — glow + solid -->
  <circle cx="256" cy="256" r="228" fill="none" stroke="#00d4aa" stroke-width="22" opacity="0.22" filter="url(#glow-t)"/>
  <circle cx="256" cy="256" r="228" fill="none" stroke="#00d4aa" stroke-width="5"/>

  <!-- 30 gear teeth — alternating tall (every 3rd) / short -->
  <polygon points="244.0,26.3 268.0,26.3 256.0,12.0" fill="#00d4aa"/>
  <polygon points="292.0,28.8 315.5,33.8 305.3,24.2" fill="#00d4aa"/>
  <polygon points="338.4,41.3 360.4,51.1 352.4,39.5" fill="#00d4aa"/>
  <polygon points="381.3,63.1 400.7,77.3 399.4,58.6" fill="#00d4aa"/>
  <polygon points="418.6,93.4 434.7,111.3 432.1,97.4" fill="#00d4aa"/>
  <polygon points="448.9,130.7 460.9,151.6 461.2,137.5" fill="#00d4aa"/>
  <polygon points="470.7,173.6 478.2,196.5 488.1,180.6" fill="#00d4aa"/>
  <polygon points="483.2,220.0 485.7,244.0 491.7,231.2" fill="#00d4aa"/>
  <polygon points="485.7,268.0 483.2,292.0 491.7,280.8" fill="#00d4aa"/>
  <polygon points="478.2,315.5 470.7,338.4 488.1,331.4" fill="#00d4aa"/>
  <polygon points="460.9,360.4 448.9,381.3 461.2,374.5" fill="#00d4aa"/>
  <polygon points="434.7,400.7 418.6,418.6 432.1,414.6" fill="#00d4aa"/>
  <polygon points="400.7,434.7 381.3,448.9 399.4,453.4" fill="#00d4aa"/>
  <polygon points="360.4,460.9 338.4,470.7 352.4,472.5" fill="#00d4aa"/>
  <polygon points="315.5,478.2 292.0,483.2 305.3,487.8" fill="#00d4aa"/>
  <polygon points="268.0,485.7 244.0,485.7 256.0,500.0" fill="#00d4aa"/>
  <polygon points="220.0,483.2 196.5,478.2 206.7,487.8" fill="#00d4aa"/>
  <polygon points="173.6,470.7 151.6,460.9 159.6,472.5" fill="#00d4aa"/>
  <polygon points="130.7,448.9 111.3,434.7 112.6,453.4" fill="#00d4aa"/>
  <polygon points="93.4,418.6 77.3,400.7 79.9,414.6"  fill="#00d4aa"/>
  <polygon points="63.1,381.3 51.1,360.4 50.8,374.5"  fill="#00d4aa"/>
  <polygon points="41.3,338.4 33.8,315.5 23.9,331.4"  fill="#00d4aa"/>
  <polygon points="28.8,292.0 26.3,268.0 20.3,280.8"  fill="#00d4aa"/>
  <polygon points="26.3,244.0 28.8,220.0 20.3,231.2"  fill="#00d4aa"/>
  <polygon points="33.8,196.5 41.3,173.6 23.9,180.6"  fill="#00d4aa"/>
  <polygon points="51.1,151.6 63.1,130.7 50.8,137.5"  fill="#00d4aa"/>
  <polygon points="77.3,111.3 93.4,93.4 79.9,97.4"    fill="#00d4aa"/>
  <polygon points="111.3,77.3 130.7,63.1 112.6,58.6"  fill="#00d4aa"/>
  <polygon points="151.6,51.1 173.6,41.3 159.6,39.5"  fill="#00d4aa"/>
  <polygon points="196.5,33.8 220.0,28.8 206.7,24.2"  fill="#00d4aa"/>

  <!-- ═══════════════════════════════
       L LETTERFORM — ARK-style bold
       ═══════════════════════════════ -->
  <!-- Outer purple glow -->
  <polygon points="75,80 185,46 185,348 442,348 408,450 75,450"
           fill="#bf00ff" opacity="0.60" filter="url(#glow-l)"/>
  <!-- Main body -->
  <polygon points="75,80 185,46 185,348 442,348 408,450 75,450"
           fill="url(#l-fill)"/>
  <!-- Depth shading overlay -->
  <polygon points="75,80 185,46 185,348 442,348 408,450 75,450"
           fill="url(#l-shade)"/>
  <!-- Top diagonal edge — teal chiseled face -->
  <line x1="75"  y1="80"  x2="185" y2="46"  stroke="#00ffcc" stroke-width="4.5" stroke-linecap="square" opacity="0.95" filter="url(#glow-e)"/>
  <!-- Right diagonal edge — teal -->
  <line x1="442" y1="348" x2="408" y2="450" stroke="#00ffcc" stroke-width="4"   stroke-linecap="square" opacity="0.90" filter="url(#glow-e)"/>
  <!-- Top of horizontal bar -->
  <line x1="185" y1="348" x2="442" y2="348" stroke="#ee88ff" stroke-width="3"   stroke-linecap="square" opacity="0.80" filter="url(#glow-e)"/>
  <!-- Left edge -->
  <line x1="75"  y1="80"  x2="75"  y2="450" stroke="#dd66ff" stroke-width="3"   stroke-linecap="square" opacity="0.70"/>
  <!-- Bottom edge -->
  <line x1="75"  y1="450" x2="408" y2="450" stroke="#cc44ff" stroke-width="2"   stroke-linecap="square" opacity="0.55"/>
  <!-- Inner chiseling score lines -->
  <line x1="174" y1="58"  x2="174" y2="340" stroke="#000000" stroke-width="3"   opacity="0.30"/>
  <line x1="187" y1="360" x2="432" y2="360" stroke="#000000" stroke-width="2.5" opacity="0.25"/>

  <!-- ═══════════════════════════════════════════════════════
       CLAW MARKS — 3 fingers gripping the right edge of the L
       Each: wide at base (right side), tapers to a hooked tip
       that digs into the L's right edge at x≈185
       ═══════════════════════════════════════════════════════ -->

  <!-- Claw 1 — top finger, grips at ~y=150 -->
  <!-- glow halo -->
  <path d="M 402,114 C 325,103 248,113 186,146 L 163,180 C 186,164 268,152 342,133 C 378,122 394,119 402,143 Z"
        fill="#00e8b0" opacity="0.30" filter="url(#glow-t)"/>
  <!-- solid body -->
  <path d="M 402,114 C 325,103 248,113 186,146 L 163,180 C 186,164 268,152 342,133 C 378,122 394,119 402,143 Z"
        fill="url(#claw-fill)" opacity="0.92"/>
  <!-- dorsal highlight -->
  <path d="M 402,114 C 325,103 248,113 186,146" fill="none"
        stroke="#00ffcc" stroke-width="2" opacity="0.75" filter="url(#glow-e)"/>

  <!-- Claw 2 — middle finger, grips at ~y=238 -->
  <path d="M 428,215 C 352,203 268,210 186,234 L 163,268 C 186,253 268,246 358,224 C 396,213 413,214 428,243 Z"
        fill="#00e8b0" opacity="0.30" filter="url(#glow-t)"/>
  <path d="M 428,215 C 352,203 268,210 186,234 L 163,268 C 186,253 268,246 358,224 C 396,213 413,214 428,243 Z"
        fill="url(#claw-fill)" opacity="0.92"/>
  <path d="M 428,215 C 352,203 268,210 186,234" fill="none"
        stroke="#00ffcc" stroke-width="2" opacity="0.75" filter="url(#glow-e)"/>

  <!-- Claw 3 — lower finger, grips at ~y=320 -->
  <path d="M 415,310 C 342,299 264,305 186,320 L 163,354 C 186,341 268,334 348,320 C 383,309 402,310 415,337 Z"
        fill="#00e8b0" opacity="0.30" filter="url(#glow-t)"/>
  <path d="M 415,310 C 342,299 264,305 186,320 L 163,354 C 186,341 268,334 348,320 C 383,309 402,310 415,337 Z"
        fill="url(#claw-fill)" opacity="0.92"/>
  <path d="M 415,310 C 342,299 264,305 186,320" fill="none"
        stroke="#00ffcc" stroke-width="2" opacity="0.75" filter="url(#glow-e)"/>
</svg>
